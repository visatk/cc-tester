name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  build-and-test:
    name: Code Quality & Build
    runs-on: ubuntu-latest

    steps:
      # Update to v4 or v5 to avoid Node 20 deprecation warning
      - name: Checkout Code
        uses: actions/checkout@v4 
        
      # Update to newer setup-node and specify Node 22/24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Use latest stable Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Code Formatting & Linting Check
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Project
        run: npm run build

  publish:
    name: Publish to NPM
    needs: build-and-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Project
        run: npm run build
        
      - name: Publish Package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
